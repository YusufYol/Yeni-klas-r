<!DOCTYPE html>
<html lang="tr">

<head>
    <link rel="icon" type="image/png" href="${window.APP_ROOT}Resimler/Logo/Racing News TR Logo.jpeg">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Racing News Türkiye - Motorsporları Dünyası</title>
    <meta name="description"
        content="Türkiye'nin en kapsamlı motorsporları haber sitesi. F1, MotoGP, WEC, Indycar ve Milli Sporcularımızda dahil olmak üzere motorsporları hakkında en güncel haber içerikleri burada.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
    <style>
        /* Critical Splash Styles */
        body {
            margin: 0;
            background-color: #000;
        }

        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999;
        }

        .splash-logo-text {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            letter-spacing: 2px;
        }

        .hidden {
            display: none !important;
        }
    </style>

    <script>
        // Dosya Değişimlerini Anlık Yakalamak (Cache Buster)
        (function () {
            const v = Date.now();
            const isLocal = window.location.protocol === 'file:';
            const root = isLocal ? '' : '/';
            window.APP_ROOT = root; // Global access for script.js

            // Favicon dinamik ayarla
            const favicon = document.querySelector('link[rel="icon"]');
            if (favicon) favicon.href = root + 'Resimler/Logo/Racing News TR Logo.jpeg';

            // Check for redirect from 404.html
            (function (l) {
                if (l.search) {
                    var q = {};
                    l.search.slice(1).split('&').forEach(function (v) {
                        var a = v.split('=');
                        q[a[0]] = a.slice(1).join('=').replace(/~and~/g, '&');
                    });
                    if (q.p !== undefined) {
                        window.history.replaceState(null, null,
                            l.pathname.slice(0, -1) + (q.p || '') +
                            (q.q ? ('?' + q.q) : '') +
                            l.hash
                        );
                    }
                }
            }(window.location));

            // CSS Yükle
            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = root + 'style.css?v=' + v;
            document.head.appendChild(link);

            // JS Dosyalarını Yükle
            ['data.js', 'script.js'].forEach(src => {
                const s = document.createElement('script');
                s.src = root + src + '?v=' + v;
                s.async = false;
                document.head.appendChild(s);
            });
        })();
    </script>
</head>

<body>

    <!-- Splash Screen -->
    <div id="splash-screen" class="splash-screen">
        <h1 class="splash-logo-text">RACING NEWS TR</h1>
    </div>

    <div id="app" class="app-container hidden">
        <!-- Header -->
        <header class="main-header">
            <button id="menu-toggle" class="menu-btn" aria-label="Menü">
                <div class="hamburger"></div>
            </button>
            <span class="header-logo-text">RACING NEWS TR</span>
        </header>

        <!-- Side Drawer -->
        <nav id="side-drawer" class="side-drawer">
            <div class="drawer-content">
                <!-- Home Link -->
                <div class="drawer-home-section" style="margin-bottom: 20px;">
                    <a href="#" class="nav-link-home" data-view="home"
                        style="font-size: 1.2rem; font-weight: 800; color: white; text-decoration: none; display: flex; align-items: center; gap: 10px;">
                        ANASAYFA
                    </a>
                </div>

                <div class="accordion">
                    <!-- Formula 1 -->
                    <div class="accordion-item" id="formula 1-menu">
                        <button class="accordion-header">Formula 1</button>
                        <div class="accordion-body">
                            <a href="#" class="nav-link" data-view="news" data-cat="formula 1">Haberler</a>
                            <a href="#" class="nav-link" data-view="pilots" data-cat="formula 1">Pilotlar - Takımlar</a>
                            <a href="#" class="nav-link" data-view="standings" data-cat="formula 1">Puan Tablosu</a>
                            <a href="#" class="nav-link" data-view="calendar" data-cat="formula 1">Takvim</a>
                        </div>
                    </div>
                    <!-- MotoGP -->
                    <div class="accordion-item" id="motogp-menu">
                        <button class="accordion-header">MotoGP</button>
                        <div class="accordion-body">
                            <a href="#" class="nav-link" data-view="news" data-cat="motogp">Haberler</a>
                            <a href="#" class="nav-link" data-view="pilots" data-cat="motogp">Pilotlar - Takımlar</a>
                            <a href="#" class="nav-link" data-view="standings" data-cat="motogp">Puan Tablosu</a>
                            <a href="#" class="nav-link" data-view="calendar" data-cat="motogp">Takvim</a>
                        </div>
                    </div>
                    <!-- Haberler -->
                    <div class="accordion-item" id="haberler-menu">
                        <button class="accordion-header">Haberler</button>
                        <div class="accordion-body">
                            <a href="#" class="nav-link" data-view="news" data-cat="haberler">Haberler</a>
                        </div>
                    </div>
                    <!-- Milli Sporcularımız -->
                    <div class="accordion-item" id="milli-sporcularımız-menu">
                        <button class="accordion-header">Milli Sporcularımız</button>
                        <div class="accordion-body">
                            <a href="#" class="nav-link" data-view="news" data-cat="milli sporcularımız">Haberler</a>
                            <a href="#" class="nav-link" data-view="pilots" data-cat="milli sporcularımız">Milli
                                Sporcularımız</a>
                        </div>
                    </div>
                    <div class="drawer-footer">
                        <a href="#" class="nav-link-bottom" data-view="about">Hakkımızda</a>
                    </div>
                </div>
        </nav>
        <div id="drawer-overlay" class="drawer-overlay"></div>

        <!-- Notification Container -->
        <div id="notification-container" class="notification-container"></div>
        <div id="news-detail-overlay"
            style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:10000; overflow-y:auto;">
        </div>

        <!-- Main Content -->
        <main id="main-content" class="content-area">
            <!-- Dynamic Content Injected Here -->
            <section id="weekend-summary" class="weekend-summary">
                <!-- Race Week Panel -->
            </section>

            <section id="track-info" class="track-info-section">
                <!-- Track Details -->
            </section>

            <section id="main-news-feed" class="news-feed">
                <h2 id="news-section-title" class="section-title">GÜNCEL HABERLER</h2>
                <div id="news-container"></div>
            </section>
        </main>
    </div>
</body>

</html>
